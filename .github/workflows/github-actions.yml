name: assignment-test
on:
    push:
        tags-ignore:
            - '*'
        branches:
            - '*'
jobs:
      full-test:
        runs-on: self-hosted
        timeout-minutes: 900 
        steps:
          - uses: actions/checkout@v3
            with:
              clean: false
              submodules: 'recursive'
          - uses: webfactory/ssh-agent@v0.5.4
            with:
                 ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          - name: Run build
            run: |
               docker run --rm \
                 -v $SSH_AUTH_SOCK:/ssh-agent -e SSH_AUTH_SOCK=/ssh-agent \
                 -e GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" \
                 -v ${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE} \
                 cuaesd/aesd-autotest:24-assignment6-yocto \
                 --workdir=${GITHUB_WORKSPACE} \
                 sh -c "
                    echo '=== Cleaning up stale lock files ==='
                    rm -f build/bitbake.lock
                    rm -f build/bitbake-cookerdaemon.log
                    rm -rf build/tmp/cache
                    rm -rf build/tmp/locks

                    echo '=== Throttling resource usage to prevent OOM crashes ==='
                    mkdir -p build/conf
                    touch build/conf/local.conf
                    # Force BitBake to use safe thread limits
                    sed -i '/BB_NUMBER_THREADS/d' build/conf/local.conf
                    sed -i '/PARALLEL_MAKE/d' build/conf/local.conf
                    echo 'BB_NUMBER_THREADS = \"2\"' >> build/conf/local.conf
                    echo 'PARALLEL_MAKE = \"-j 2\"' >> build/conf/local.conf

                    # FIX: Start a background spinner that prints a dot every 30 seconds 
                    # to prevent the GitHub runner from assuming the job has hung.
                    exec 3>&1
                    sh -c 'while true; do echo \"[Keep-Alive] Still building...\" >&3; sleep 30; done' &
                    PING_PID=\$!
                    echo '=== Starting original build script ==='
                    ./build.sh
                    
                    # Kill the keep-alive loop once the build completes
                    kill \$PING_PID
                 "
          - name: Cleanup
            if: always()
            run: |
              ssh-add -D
          - name: Run full test
            timeout-minutes: 15
            run: |
               docker run --rm \
                 -v ${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE} \
                 cuaesd/aesd-autotest:assignment6-yocto \
                 --workdir=${GITHUB_WORKSPACE} \
                 ./full-test.sh
